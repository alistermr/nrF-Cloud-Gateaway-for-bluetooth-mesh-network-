<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nRF Cloud – Send Message</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e14;
      --surface:   #131620;
      --surface-2: #1a1e2e;
      --border:    #232840;
      --border-hl: #2f3552;
      --text:      #c9d1d9;
      --text-dim:  #6b7394;
      --text-mono: #8db9e8;
      --accent:    #3b82f6;
      --accent-hl: #2563eb;
      --green:     #22c55e;
      --green-dim: rgba(34,197,94,.12);
      --red:       #ef4444;
      --red-dim:   rgba(239,68,68,.12);
      --yellow:    #eab308;
      --yellow-dim:rgba(234,179,8,.12);
      --radius:    10px;
      --radius-sm: 6px;
      --mono:      "JetBrains Mono", "Cascadia Code", "Fira Code", monospace;
      --sans:      "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 2.25rem 2.25rem;
      width: 100%;
      max-width: 560px;
      box-shadow:
        0 1px 2px rgba(0,0,0,.3),
        0 8px 24px rgba(0,0,0,.25),
        0 0 0 1px rgba(255,255,255,.03) inset;
    }

    /* ── Typography ── */
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.01em;
      margin-bottom: .15rem;
    }

    .subtitle {
      font-size: .8rem;
      color: var(--text-dim);
      margin-bottom: 1.75rem;
      font-weight: 400;
    }

    label {
      display: block;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-dim);
      margin-bottom: .35rem;
    }

    /* ── Inputs ── */
    textarea {
      width: 100%;
      min-height: 80px;
      padding: .65rem .85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: .82rem;
      resize: vertical;
      transition: border-color .15s, box-shadow .15s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: .5rem;
      margin-top: .75rem;
    }

    button {
      flex: 1;
      padding: .55rem 1rem;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, box-shadow .15s, transform .1s;
      line-height: 1.3;
    }

    button:active { transform: scale(.97); }

    .btn-send {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 1px 3px rgba(59,130,246,.3);
    }

    .btn-send:hover {
      background: var(--accent-hl);
      box-shadow: 0 2px 8px rgba(59,130,246,.35);
    }

    .btn-send:disabled {
      background: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-device {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-device:hover {
      background: var(--border-hl);
      border-color: var(--border-hl);
    }

    /* ── Section dividers ── */
    .section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    /* ── Output / response ── */
    .output-section { margin-top: 1.25rem; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .35rem;
    }

    .output-header label { margin-bottom: 0; }

    .status-badge {
      font-size: .68rem;
      padding: .15rem .5rem;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: .02em;
    }

    .status-badge.success { background: var(--green-dim); color: var(--green); }
    .status-badge.error   { background: var(--red-dim);   color: var(--red); }
    .status-badge.pending { background: var(--yellow-dim); color: var(--yellow); }

    #output {
      width: 100%;
      min-height: 140px;
      padding: .7rem .85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-mono);
      font-family: var(--mono);
      font-size: .78rem;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      max-height: 280px;
      line-height: 1.55;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Live feed ── */
    .live-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .live-header {
      display: flex;
      align-items: center;
      gap: .45rem;
      margin-bottom: .45rem;
    }

    .live-header label { margin-bottom: 0; }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      display: inline-block;
      flex-shrink: 0;
    }

    .live-dot.active {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: .35; }
    }

    .live-status {
      font-size: .7rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    #liveFeed {
      width: 100%;
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }

    .live-msg {
      padding: .4rem .65rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--text-mono);
      word-break: break-all;
    }

    .live-msg.new { animation: fadeIn .35s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .live-msg .timestamp {
      color: var(--text-dim);
      font-size: .68rem;
      margin-right: .4rem;
    }

    .live-msg .app-id {
      color: var(--accent);
      font-weight: 600;
      margin-right: .35rem;
    }

    .empty-feed, .no-devices {
      color: var(--text-dim);
      font-size: .78rem;
      font-style: italic;
      padding: .4rem 0;
    }

    /* ── Device sections ── */
    .devices-section, .provisioned-devices {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .devices-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .45rem;
    }

    .devices-header label { margin-bottom: 0; }

    .btn-scan {
      flex: none;
      padding: .3rem .7rem;
      font-size: .72rem;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .btn-scan:hover {
      background: var(--border-hl);
      border-color: var(--border-hl);
    }

    .btn-scan.scanning {
      background: var(--red-dim);
      color: var(--red);
      border-color: rgba(239,68,68,.25);
    }

    .device-list {
      display: flex;
      flex-direction: column;
      gap: .3rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      padding: .45rem .7rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .device-item:hover {
      border-color: var(--border-hl);
      background: var(--surface-2);
    }

    .device-item.selected {
      border-color: var(--accent);
      background: rgba(59,130,246,.06);
    }

    .device-uuid {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--text-mono);
    }

    .device-index {
      font-size: .68rem;
      color: var(--text-dim);
      margin-right: .4rem;
    }

    .btn-provision {
      flex: none;
      padding: .4rem .85rem;
      font-size: .75rem;
      background: var(--green);
      color: #fff;
      border-radius: var(--radius-sm);
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(34,197,94,.25);
    }

    .btn-provision:hover {
      background: #16a34a;
      box-shadow: 0 2px 8px rgba(34,197,94,.3);
    }

    .btn-provision:disabled {
      background: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Scrollbar styling ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border-hl);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  </style>
</head>
<body>
  <div class="card">
    <h1>nRF Cloud Messenger</h1>
    <p class="subtitle">Send a message to your board &amp; see the API response</p>
    <button class="btn-device" id="initBtn" onclick="mesh_init()">Mesh Init</button>

    <!-- Provisioned devices -->
    <div class="provisioned-devices">
        <label>Provisioned Devices</label>
        <div class="device-list" id="provisionedList">
          <div class="no-devices">No provisioned devices yet.</div>
        </div>  
     </div>

    <!-- Unprovisioned devices -->
    <div class="devices-section">
      <div class="devices-header">
        <label>Unprovisioned Devices</label>
        <button class="btn-scan" id="scanBtn" onclick="toggleScan()">🔍 Scan</button>
      </div>
      <div class="device-list" id="deviceList">
        <div class="no-devices">No unprovisioned devices found. Click Scan to start.</div>
      </div>
      <div class="btn-row">
        <button class="btn-provision" id="provisionBtn" disabled onclick="provisionSelected()">Provision Selected</button>
      </div>
    </div>

    <div class="output-section">
      <div class="output-header">
        <label>Response</label>
        <span class="status-badge" id="statusBadge" style="display:none;"></span>
      </div>
      <div id="output">Waiting for action…</div>
    </div>

     <label for="message">Message</label>
    <textarea id="message" placeholder="Type your message here…">Hello from nRF Cloud</textarea>

    <div class="btn-row">
      <button class="btn-send" id="sendBtn" onclick="sendMessagebtn()">Send Message</button>
      <button class="btn-device" onclick="getDeviceState()">Device State</button>
      <button class="btn-device" onclick="listMessages()">📨 Messages</button>
    </div>


  </div>

  <script>
    const API = ""; // same origin — served by Flask
    let addressCache = [];
    let nonProvCache = [];

    function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setStatus(type, text) {
      const badge = document.getElementById("statusBadge");
      badge.style.display = "inline-block";
      badge.className = "status-badge " + type;
      badge.textContent = text;
    }

    function setOutput(content) {
      document.getElementById("output").textContent =
        typeof content === "string" ? content : JSON.stringify(content, null, 2);
    }

    async function sendMessage(message) {
      try {
        const res = await fetch(API + "/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        return res
        await delay(1000); // simulate network delay
      } catch (err) {
        setStatus("error", "Network Error");
        setOutput(err.message);
      }
    }

    async function sendMessagebtn() {
      const msg = document.getElementById("message").value.trim();
      if (!msg) { setOutput("Please enter a message."); return; }

      const btn = document.getElementById("sendBtn");
      btn.disabled = true;
      setOutput("");
      setStatus("pending", "Sending…");
      document.getElementById("output").innerHTML = '<span class="spinner"></span> Sending message to board (c2d)…';
      const res = await sendMessage(msg);
      if (!res) return; // error already handled in sendMessage
  
      const data = await res.json();
      if (res.ok) {
        setStatus("success", `${res.status} OK`);
      } else {
          setStatus("error", `${res.status} Error`);
      }
      setStatus("success", "Message sent");
      setOutput(data);
      btn.disabled = false;
    }

    async function getDeviceState() {
      setOutput("");
      setStatus("pending", "Fetching…");
      document.getElementById("output").innerHTML = '<span class="spinner"></span> Fetching device state…';

      try {
        const res = await fetch(API + "/api/device");
        const data = await res.json();

        if (res.ok) {
          setStatus("success", `${res.status} OK`);
        } else {
          setStatus("error", `${res.status} Error`);
        }

        setOutput(data);
      } catch (err) {
        setStatus("error", "Network Error");
        setOutput(err.message);
      }
    }

    async function listMessages() {
      setOutput("");
      setStatus("pending", "Fetching…");
      document.getElementById("output").innerHTML = '<span class="spinner"></span> Loading message history…';

      try {
        const res = await fetch(API + "/api/messages", {

        });
        const data = await res.json();

        if (res.ok) {
          setStatus("success", `${data.response?.total ?? 0} messages`);
        } else {
          setStatus("error", `${res.status} Error`);
        }

        setOutput(data);
      } catch (err) {
        setStatus("error", "Network Error");
        setOutput(err.message);
      }
    }

    async function mesh_init(){
      setOutput("");
      setStatus("pending", "Initializing mesh");
      document.getElementById("output").innerHTML = '<span class="spinner"></span> Initializing mesh network…';
  
      document.getElementById("initBtn").style.display = "none";
      await sendMessage("mesh init");
      await delay(1000);
      await sendMessage("mesh cdb create")
      await delay(1000);
      await sendMessage("mesh prov local 0 0x0001")
      addressCache[0] = "0x0001";

      setStatus("success", "Mesh Initialized");
      document.getElementById("output").innerHTML = "Mesh network initialized.";
    }

    let prov_beacon = false;
    let selectedDeviceIdx = null;

    async function toggle_prov_beacon() {
      if (prov_beacon){
        await sendMessage("mesh prov beacon-listen off");
        prov_beacon = false;
        return;
      }else{
        await sendMessage("mesh prov beacon-listen on");
        //for testing
        nonProvCache[0] = "0622b315eab04703b9dd4cea154fc8fc";
        prov_beacon = true;
      }
    }

    function renderProvisionedList() {
      const list = document.getElementById("provisionedList");
      const cache = addressCache.splice(1); // skip local provisioner at 0x0001
      if (cache.length === 0) {
        list.innerHTML = '<div class="no-devices">No provisioned devices yet.</div>';
        return;
      }

      list.innerHTML = "";
      cache.forEach((addr, i) => {
        for (u = 0; u < 4; u++) {
          const el = document.createElement("div");
          el.className = "device-item";
          el.innerHTML =
            `<span><span class="device-index">#${i*4+u}</span>` +
            `<span class="device-uuid">${addr + u}</span></span>` +
            `<button class="btn-device" onclick="toggle_light('${addr + u}', true)">On</button>` +
            `<button class="btn-device" onclick="toggle_light('${addr + u}', false)" style="background:#ef4444;color:#fff;">Off</button>`;
          list.appendChild(el);
        }

        


      });
    }

    function renderDeviceList() {
      const list = document.getElementById("deviceList");
      const provBtn = document.getElementById("provisionBtn");

      if (nonProvCache.length === 0) {
        list.innerHTML = '<div class="no-devices">No unprovisioned devices found. Click Scan to start.</div>';
        selectedDeviceIdx = null;
        provBtn.disabled = true;
        return;
      }

      list.innerHTML = "";
      nonProvCache.forEach((uuid, i) => {
        const el = document.createElement("div");
        el.className = "device-item" + (selectedDeviceIdx === i ? " selected" : "");
        el.innerHTML =
          `<span><span class="device-index">#${i}</span>` +
          `<span class="device-uuid">${uuid}</span></span>`;
        el.onclick = () => selectDevice(i);
        list.appendChild(el);
      });
    }

    function selectDevice(idx) {
      selectedDeviceIdx = idx;
      document.getElementById("provisionBtn").disabled = false;
      renderDeviceList();
    }

    async function toggleScan() {
      const btn = document.getElementById("scanBtn");
      await toggle_prov_beacon();

      if (prov_beacon) {
        btn.textContent = "⏹ Stop";
        btn.classList.add("scanning");
      } else {
        btn.textContent = "🔍 Scan";
        btn.classList.remove("scanning");
      }

      renderDeviceList();
    }

    //assumes provising generic onoff on nrf54l15
    async function provisionSelected() {
      if (selectedDeviceIdx === null) return;
      const uuid = nonProvCache[selectedDeviceIdx];
      const nextAddrNum = addressCache.length * 0x10;
      const toHex = (n) => "0x" + n.toString(16).padStart(4, "0");
      const nextAddr = toHex(nextAddrNum);

      setStatus("pending", "Provisioning…" + nextAddr);
      document.getElementById("output").innerHTML =
        '<span class="spinner"></span> Provisioning ' + uuid + '…';

      await sendMessage(`mesh prov remote ${uuid} 0 ${nextAddr} 5`);

      // move to mesh init
      //------------------
      await sendMessage("mesh target dst local");
      await sendMessage(`mesh target net 0`);
      await sendMessage("mesh models cfg appkey add 0 0");
      //---------------

      await sendMessage(`mesh target dst ${nextAddr}`);
      await sendMessage("mesh target net 0"); //maybe redundant
      await sendMessage("mesh models cfg appkey add 0 0");
      await sendMessage(`mesh models cfg model app-bind ${nextAddr} 0 0x1000`); // bind to generic onoff client
      await sendMessage(`mesh models cfg model app-bind ${toHex(nextAddrNum + 1)} 0 0x1000`);
      await sendMessage(`mesh models cfg model app-bind ${toHex(nextAddrNum + 2)} 0 0x1000`);
      await sendMessage(`mesh models cfg model app-bind ${toHex(nextAddrNum + 3)} 0 0x1000`);
      
      addressCache.push(nextAddr);
      renderProvisionedList();

      // Remove from unprovisioned list
      nonProvCache.splice(selectedDeviceIdx, 1);
      selectedDeviceIdx = null;
      document.getElementById("provisionBtn").disabled = true;
      renderDeviceList();

      setStatus("success", "Provisioned " + nextAddr);
      setOutput(`Device ${uuid} provisioned at address ${nextAddr}`);
    }

    async function toggle_light(addr, on) {
      await sendMessage(`mesh target dst ${addr}`);
      await sendMessage("mesh target net 0"); // redundant?
      await sendMessage("mesh target app 0"); //redundant?
      if (on) {
        await sendMessage(`mesh test net-send 82020100`);
      } else {
        await sendMessage(`mesh test net-send 82020000`);
      }
    }
    
    // Initial poll + interval
    //pollMessages();
    //setInterval(pollMessages, 5000);
  </script>
</body>
</html>
